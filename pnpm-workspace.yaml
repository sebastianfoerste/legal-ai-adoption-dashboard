# pnpm 10+ reads overrides here, not from the package.json "pnpm" field.
# postcss <8.5.10 has a moderate XSS advisory (GHSA-qx2v-qp2m-jg93), pulled in
# transitively via next; pin it to the patched line.
packages:
  - "."

# sharp and unrs-resolver ship prebuilt binaries; their postinstall scripts are not needed.
# allowBuilds is the pnpm 11 form; ignoredBuiltDependencies keeps older installs quiet.
allowBuilds:
  sharp: false
  unrs-resolver: false
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

overrides:
  postcss: '>=8.5.10'
