# pnpm 10+ reads overrides here, not from the package.json "pnpm" field.
# postcss <8.5.10 has a moderate XSS advisory (GHSA-qx2v-qp2m-jg93), pulled in
# transitively via next; pin it to the patched line.
packages:
  - "."

# pnpm 11 requires explicit approval for dependency build scripts in fresh CI installs.
allowBuilds:
  sharp: true
  unrs-resolver: true

overrides:
  postcss: '>=8.5.10'
